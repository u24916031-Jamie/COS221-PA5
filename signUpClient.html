<!doctype html>
<html>
  <head>
    <title>Travel Agency Signup</title>
    <link rel="stylesheet" href="css/homePage.css" />
    <link rel="stylesheet" href="css/signUp.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" /> 
  </head>

  <div class = "login-card" style = "width: 500px">
    <form action="server/registerapi.php" method="POST">
      <h3>Sign Up</h3>
        <input type = "email" name="email" placeholder = "Email" required>
        <input type = "password" name="password" placeholder = "Password" required>
        <input type="text" name = "cell" placeholder="Cellphone number" required>
        <input type="text" name="aName" placeholder="Enter agency name">
        <input type="text" name="cfname" placeholder="Enter contact person first name">
        <input type="text" name="clname" placeholder="Enter contact person surname">
      <button type="submit" class="agent-button">Sign up</button>
    </form>
  </div>
</html>

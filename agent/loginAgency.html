<!doctype html>
<html>
  <head>
    <title>Tripistry Agency Login</title>
    <link rel="stylesheet" href="../css/homePage.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
  </head>
  <body>
    <div class = "page">
      <div class = "left-section">
        <h2>TRIPISTRY TRAVEL AGENCY</h2>
      </div>
      <div class = "right-section">
        <div class = "login-card">
          <h3>Login</h3>
          <form id="loginForm">
            <input type="hidden" name="type" value="login">
            <input type="hidden" name="user_type" value="Travel Agency">
            
            <input type = "email" name="email" placeholder = "Email" required>
            <input type = "password" name="password" placeholder = "Password" required>
            <button type="submit" class="agent-button">Enter dashboard</button>
          </form>
            <p>Don't have an account?<a href = "signUpAgency.html"> Sign in </a></p>
            <script src="./js/loginAgency.js"></script>
        </div>
      </div>
    </div>
    <a href="../index.html" style="position:fixed; left:16px; bottom:16px; z-index:1000; display:inline-block; padding:10px 14px; background:#0047A3; color:#fff; border-radius:8px; text-decoration:none; font-size:0.95rem;">Back to Home</a>
  </body>
  <script src="./js/loginAgency.js"></script>
</html>

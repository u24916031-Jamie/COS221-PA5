<!doctype html>
<html>
  <head>
    <title>Traveller Signup</title>
    <link rel="stylesheet" href="css/homePage.css" />
    <link rel="stylesheet" href="css/signUp.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" /> 
  </head>

  <div class = "login-card" style = "width: 500px">
    <form>
      <h3>Sign Up</h3>
        <input type="text" name="cFname" placeholder="Enter your first name">
        <input type="text" name="cLname" placeholder="Enter your surname">
        <input type="text" name="cEmail" placeholder="Enter your email">
        <input type="text" name="idNum" placeholder="Enter your id number">
        <input type="password" name="cPwd" placeholder="Enter account password">
      <button class="submit">sign up</button>
    </form>
  </div>
</html>

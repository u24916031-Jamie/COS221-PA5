<!doctype html>
<html>
  <head>
    <title>Travel Agency Signup</title>
    <link rel="stylesheet" href="css/homePage.css" />
    <link rel="stylesheet" href="css/signUp.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" /> 
  </head>

  <div class = "login-card" style = "width: 500px">
    <form>
      <h3>Sign Up</h3>
        <input type="text" name="aName" placeholder="Enter agency name">
        <input type="text" name="aFname" placeholder="Enter contact person first name">
        <input type="text" name="aLname" placeholder="Enter contact person surname">
        <input type="text" name="aEmail" placeholder="Enter contact email">
        <input type="password" name="aPwd" placeholder="Enter account password">
      <button class="submit">sign up</button>
    </form>
  </div>
</html>
